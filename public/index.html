<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Karyera Maslahatchisi 🚀</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            color: #333;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        h1 { text-align: center; color: #333; margin-bottom: 1rem; }
        h2 { color: #667eea; margin-bottom: 1rem; }
        h3 { color: #10b981; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #e1e5e9; border-radius: 10px; font-size: 16px; transition: all 0.3s; }
        input:focus, textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        button { 
            width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; 
            cursor: pointer; transition: all 0.3s; 
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
        .job-card { background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 1.5rem; border-radius: 15px; margin: 1rem 0; }
        .job-card a { background: white; color: #059669; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; }
        .salary-info { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; padding: 1.5rem; border-radius: 15px; text-align: center; }
        .interview-question { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; padding: 1.5rem; border-radius: 15px; }
        .hidden { display: none; }
        .section { margin-top: 2rem; }
        @media (max-width: 768px) { .container { padding: 10px; } .card { padding: 1.5rem; } }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login/Register -->
        <div id="authContainer" class="card">
            <h1>🚀 AI Karyera Maslahatchisi</h1>
            <p style="text-align: center; color: #666; margin-bottom: 2rem;">Ish topish, maosh bilish, suhbat mashq qilish!</p>
            
            <div id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="example@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Parol</label>
                    <input type="password" id="loginPassword" placeholder="Parol" required>
                </div>
                <button onclick="login()">🚀 Kirish</button>
                <p style="text-align: center; margin-top: 1rem; color: #666;">
                    Hisobingiz yo'qmi? <a href="#" onclick="showRegister()" style="color: #667eea; font-weight: bold;">Ro'yxatdan o'ting</a>
                </p>
            </div>

            <div id="registerForm" class="hidden">
                <div class="form-group">
                    <label>Ismingiz</label>
                    <input type="text" id="regUsername" placeholder="Ibrohim Oxunov" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="example@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Parol</label>
                    <input type="password" id="regPassword" placeholder="Kuchli parol" required>
                </div>
                <button onclick="register()">✅ Ro'yxatdan o'tish</button>
            </div>
            <div id="errorMsg" style="color: #ef4444; text-align: center; margin-top: 1rem; display: none;"></div>
        </div>

        <!-- Main Dashboard -->
        <div id="dashboard" class="hidden">
            <div class="card">
                <h2>👋 Salom, <span id="userName"></span>!</h2>
                <button onclick="logout()" style="width: auto; padding: 10px 20px; background: #ef4444; margin-top: 1rem;">🚪 Chiqish</button>
            </div>

            <!-- AI Career Advisor -->
            <div class="card section">
                <h2>🤖 AI Karyera Maslahatchisi</h2>
                <div class="form-group">
                    <label>🎯 Karyera maqsadingiz</label>
                    <input type="text" id="goal" placeholder="Frontend developer bo'lmoqchiman" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>📚 Tajriba (yil)</label>
                        <input type="number" id="experience" min="0" max="20" value="0">
                    </div>
                    <div class="form-group">
                        <label>⭐ Skilllaringiz</label>
                        <input type="text" id="skills" placeholder="React, JavaScript, Node.js">
                    </div>
                </div>
                <button onclick="getCareerAdvice()">🚀 AI MASLAHAT OLISH</button>
                <div id="adviceResult" class="hidden" style="margin-top: 2rem; padding: 1.5rem; background: #f0f9ff; border-radius: 15px; white-space: pre-wrap;"></div>
            </div>

            <!-- Salary Calculator -->
            <div class="card section">
                <h2>💰 Maosh Kalkulyatori</h2>
                <button onclick="calculateSalary()" style="width: auto; padding: 12px 24px; background: #f59e0b;">💸 Hisoblash</button>
                <div id="salaryResult" class="hidden salary-info" style="margin-top: 1.5rem;">
                    <h3 id="salaryRange"></h3>
                    <p id="salaryUsd"></p>
                </div>
            </div>

            <!-- Job Search -->
            <div class="card section">
                <h2>💼 Sizga mos ISHLAR</h2>
                <button onclick="findJobs()" style="width: auto; padding: 12px 24px; background: #10b981;">🔍 Qidirish</button>
                <div id="jobsList" class="hidden"></div>
            </div>

            <!-- Interview Simulator -->
            <div class="card section">
                <h2>🎤 Suhbat Mashq Bot</h2>
                <button onclick="getInterviewQuestion()" style="width: auto; padding: 12px 24px; background: #8b5cf6;">❓ Savol olish</button>
                <div id="interviewResult" class="hidden interview-question" style="margin-top: 1.5rem;">
                    <h3>🎯 Savol:</h3>
                    <p id="interviewQuestion"></p>
                    <button onclick="nextQuestion()" style="width: auto; padding: 10px 20px; background: white; color: #8b5cf6; margin-top: 1rem;">➡️ Keyingi savol</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let token = localStorage.getItem('token');
        let currentRole = 'frontend';

        // Auth functions
        async function register() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await response.json();
                
                if (response.ok) {
                    alert('✅ Ro\'yxatdan o\'tdingiz! Kirishingiz mumkin.');
                    showLogin();
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Ulanish xatosi!');
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    token = data.token;
                    document.getElementById('userName').textContent = data.user.username;
                    showDashboard();
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Serverga ulanib bo\'lmadi!');
            }
        }

        function showError(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            setTimeout(() => errorEl.style.display = 'none', 3000);
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

        function showDashboard() {
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        function logout() {
            localStorage.removeItem('token');
            token = null;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('authContainer').classList.remove('hidden');
            showLogin();
        }

        // AI Career Advice
        async function getCareerAdvice() {
            const goal = document.getElementById('goal').value;
            const experience = document.getElementById('experience').value;
            const skills = document.getElementById('skills').value;

            if (!goal || !skills) {
                alert('Maqsad va skill kiriting!');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/career-advice`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ goal, experience: parseInt(experience), skills })
                });
                
                const data = await response.json();
                document.getElementById('adviceResult').textContent = data.advice;
                document.getElementById('adviceResult').classList.remove('hidden');
                document.getElementById('adviceResult').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                alert('AI xatosi!');
            }
        }

        // Salary Calculator
        async function calculateSalary() {
            const role = document.getElementById('goal').value.toLowerCase().includes('frontend') ? 'frontend' : 
                        document.getElementById('goal').value.toLowerCase().includes('backend') ? 'backend' : 'fullstack';
            const experience = document.getElementById('experience').value;
            const skills = document.getElementById('skills').value;

            try {
                const response = await fetch(`${API_URL}/salary-calculator`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ role, experience: parseInt(experience), skills })
                });
                
                const data = await response.json();
                document.getElementById('salaryRange').textContent = `💰 ${data.min} - ${data.max}`;
                document.getElementById('salaryUsd').textContent = `🌍 ${data.usd} USD`;
                document.getElementById('salaryResult').classList.remove('hidden');
            } catch (error) {
                alert('Maosh hisoblashda xato!');
            }
        }

        // Job Search
        async function findJobs() {
            const goal = document.getElementById('goal').value;
            const skills = document.getElementById('skills').value;

            try {
                const response = await fetch(`${API_URL}/find-jobs`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ goal, skills })
                });
                
                const data = await response.json();
                displayJobs(data.jobs);
            } catch (error) {
                alert('Ish qidirishda xato!');
            }
        }

        function displayJobs(jobs) {
            const jobsList = document.getElementById('jobsList');
            if (jobs.length === 0) {
                jobsList.innerHTML = '<p style="text-align: center; color: #666;">Hozircha ish topilmadi 😔</p>';
                return;
            }
            
            jobsList.innerHTML = jobs.map(job => `
                <div class="job-card">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div>
                            <h4>${job.title}</h4>
                            <p>${job.company} | ${job.salary} | ${job.type}</p>
                        </div>
                        <a href="${job.url}" target="_blank">👉 Ariza berish</a>
                    </div>
                </div>
            `).join('');
            document.getElementById('jobsList').classList.remove('hidden');
        }

        // Interview Simulator
        async function getInterviewQuestion() {
            const role = document.getElementById('goal').value.toLowerCase().includes('frontend') ? 'frontend' : 'backend';
            
            try {
                const response = await fetch(`${API_URL}/interview-question`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ role })
                });
                
                const data = await response.json();
                document.getElementById('interviewQuestion').textContent = data.question;
                document.getElementById('interviewResult').classList.remove('hidden');
            } catch (error) {
                alert('Suhbat savoli olishda xato!');
            }
        }

        function nextQuestion() {
            getInterviewQuestion();
        }

        // Check token on load
        if (token) {
            showDashboard();
        }
    </script>
</body>
</html>
